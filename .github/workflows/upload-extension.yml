# Builds the Chrome extension and uploads it as a draft to the Chrome Web Store.
# Does NOT publish — the operator publishes manually from the CWS dashboard.
# Requires CWS_EXTENSION_ID to be set as a repository secret. Skips upload if missing.
name: Upload Extension Draft

on:
  push:
    branches: [main]
    paths:
      - "extension/**"
      - ".github/workflows/upload-extension.yml"

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd extension && npm ci

      - name: Build extension
        run: cd extension && npm run build

      - name: Package extension
        run: cd extension && npm run package

      - name: Upload draft to Chrome Web Store
        if: ${{ secrets.CWS_EXTENSION_ID != '' }}
        run: |
          # Exchange refresh token for access token
          ACCESS_TOKEN=$(curl -sf -X POST "https://oauth2.googleapis.com/token" \
            -d "client_id=${{ secrets.CWS_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CWS_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CWS_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token" | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "::error::Failed to get access token. Check CWS_CLIENT_ID, CWS_CLIENT_SECRET, and CWS_REFRESH_TOKEN secrets."
            exit 1
          fi

          # Upload zip as draft (does not publish)
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PUT "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CWS_EXTENSION_ID }}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -T extension/extension.zip)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          UPLOAD_STATE=$(echo "$BODY" | jq -r '.uploadState' 2>/dev/null)
          if [ "$UPLOAD_STATE" != "SUCCESS" ]; then
            echo "::error::Upload failed (state: $UPLOAD_STATE, HTTP $HTTP_CODE)"
            exit 1
          fi

          echo "Draft uploaded successfully"
